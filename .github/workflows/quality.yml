name: Quality Gate

on:
  pull_request:
  push:
    branches: [main, rewrite/cleanroom-v1, rewrite/ultra-aguri-news-language-quality]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run validate:data
      - run: npm run verify:cleanroom
      - run: npm run test
      - run: npm run test:dialogue
      - run: npm run test:rss
      - run: SIMULATION_SESSIONS=500 npm run simulate:dialogue
      - run: npm run simulate:news
      - run: npm run build
        env:
          VITE_BASE_PATH: /Agree-to-issho/
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-failure-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
            output/
          if-no-files-found: ignore
