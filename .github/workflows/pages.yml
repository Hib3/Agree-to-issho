name: Deploy GitHub Pages

on:
  push:
    branches: [main, rewrite/cleanroom-v1, rewrite/ultra-aguri-news-language-quality]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint and format
        run: npm run lint && npm run format:check

      - name: Test
        run: npm run test

      - name: Dialogue and RSS gates
        run: npm run test:dialogue && npm run test:rss

      - name: Lightweight simulations
        run: SIMULATION_SESSIONS=500 npm run simulate:dialogue && npm run simulate:news

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Agree-to-issho/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
